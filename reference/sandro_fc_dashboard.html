<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary: #0b1120;
  --bg-secondary: #111827;
  --bg-card: rgba(17, 24, 39, 0.8);
  --border: rgba(75, 85, 99, 0.3);
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent-blue: #38bdf8;
  --accent-purple: #a78bfa;
  --accent-green: #34d399;
  --accent-yellow: #fbbf24;
  --accent-red: #f87171;
  --accent-orange: #fb923c;
  --gradient-blue: linear-gradient(135deg, #0ea5e9, #6366f1);
  --gradient-green: linear-gradient(135deg, #10b981, #34d399);
  --gradient-yellow: linear-gradient(135deg, #f59e0b, #fbbf24);
  --gradient-purple: linear-gradient(135deg, #8b5cf6, #a78bfa);
  --gradient-orange: linear-gradient(135deg, #f97316, #fb923c);
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary); color: var(--text-primary);
  min-height: 100vh; overflow-x: hidden;
}
.bg-glow {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0; overflow: hidden;
}
.bg-glow::before {
  content: ''; position: absolute; top: -20%; right: -10%;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(56,189,248,0.08) 0%, transparent 70%);
  border-radius: 50%;
}
.bg-glow::after {
  content: ''; position: absolute; bottom: -20%; left: -10%;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(139,92,246,0.06) 0%, transparent 70%);
  border-radius: 50%;
}
/* Layout */
.app { position: relative; z-index: 1; }
.sidebar {
  position: fixed; top: 0; left: 0; width: 240px; height: 100vh;
  background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; z-index: 100;
  transition: transform 0.3s ease;
}
.sidebar-header { padding: 28px 24px 20px; }
.sidebar-header h1 {
  font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
  background: linear-gradient(135deg, #38bdf8, #818cf8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.sidebar-header p { font-size: 11px; color: var(--text-muted); margin-top: 4px; letter-spacing: 1.5px; text-transform: uppercase; }
.nav { flex: 1; padding: 8px 12px; display: flex; flex-direction: column; gap: 4px; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 500; cursor: pointer;
  color: var(--text-muted); border: 1px solid transparent;
  transition: all 0.2s ease; background: none;
  width: 100%; text-align: left;
}
.nav-item:hover { background: rgba(56,189,248,0.05); color: var(--text-secondary); }
.nav-item.active {
  background: rgba(56,189,248,0.1); color: var(--accent-blue);
  border-color: rgba(56,189,248,0.15); box-shadow: 0 0 20px rgba(56,189,248,0.05);
}
.nav-icon { width: 20px; text-align: center; font-size: 16px; }
.main { margin-left: 240px; padding: 32px 40px; min-height: 100vh; }
.page-header { margin-bottom: 32px; }
.page-header h2 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
.page-header p { color: var(--text-muted); font-size: 14px; margin-top: 6px; }
/* ── Content Layout: 좌/우 2단 ── */
.content-row { display: grid; grid-template-columns: 1fr 1.4fr; gap: 20px; align-items: start; }
@media (max-width: 1100px) { .content-row { grid-template-columns: 1fr; } }
/* Left column */
.left-col { display: flex; flex-direction: column; gap: 16px; }
/* Record card */
.record-card {
  background: var(--bg-card); backdrop-filter: blur(12px);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 22px 24px;
}
.rc-wdl { display: flex; gap: 20px; margin-bottom: 14px; }
.rc-item { text-align: center; }
.rc-num { font-size: 30px; font-weight: 900; letter-spacing: -1px; line-height: 1; }
.rc-label { font-size: 10px; color: var(--text-muted); margin-top: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
.rc-divider { width: 1px; background: var(--border); align-self: stretch; }
.rc-stats { display: flex; gap: 20px; align-items: center; flex: 1; justify-content: space-evenly; }
.rc-stat { text-align: center; }
.rc-stat-val { font-size: 24px; font-weight: 800; line-height: 1; }
.rc-stat-label { font-size: 10px; color: var(--text-muted); margin-top: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
/* Form circles */
.form-flow { display: flex; gap: 5px; align-items: center; margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(75,85,99,0.2); }
.form-label { font-size: 10px; color: var(--text-muted); margin-right: 6px; font-weight: 500; white-space: nowrap; }
.form-dot {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 800; flex-shrink: 0;
}
.form-dot.w { background: rgba(56,189,248,0.2); color: var(--accent-blue); border: 1.5px solid rgba(56,189,248,0.4); }
.form-dot.d { background: rgba(148,163,184,0.15); color: var(--text-secondary); border: 1.5px solid rgba(148,163,184,0.3); }
.form-dot.l { background: rgba(248,113,113,0.15); color: var(--accent-red); border: 1.5px solid rgba(248,113,113,0.3); }
/* Stat cards 2x2 */
.stat-grid-2x2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.stat-card {
  background: var(--bg-card); backdrop-filter: blur(12px);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 18px; position: relative; overflow: hidden;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}
.stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
.stat-card .sc-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.stat-card .sc-icon {
  width: 30px; height: 30px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
}
.stat-card .sc-label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
.stat-card .sc-value { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
.stat-card .sc-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
/* Right match panel */
.match-panel {
  background: var(--bg-card); backdrop-filter: blur(12px);
  border: 1px solid var(--border); border-radius: var(--radius);
  display: flex; flex-direction: column; overflow: hidden;
}
.match-panel-header {
  padding: 18px 22px; border-bottom: 1px solid var(--border);
  font-size: 15px; font-weight: 700; flex-shrink: 0;
}
.match-panel-body { overflow-y: auto; padding: 12px; flex: 1; }
.section { margin-bottom: 32px; }
/* Match Card - Compact */
.match-card {
  background: var(--bg-card); backdrop-filter: blur(12px);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px; transition: all 0.25s ease; position: relative; overflow: hidden;
}
.match-card:hover { border-color: rgba(56,189,248,0.25); box-shadow: 0 0 30px rgba(56,189,248,0.05); transform: translateY(-2px); }
.match-card .mc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.match-card .mc-date { font-size: 12px; color: var(--text-muted); }
.match-card .mc-venue { font-size: 11px; color: var(--text-muted); font-style: italic; }
.badge {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
}
.badge-win { background: rgba(56,189,248,0.15); color: var(--accent-blue); }
.badge-draw { background: rgba(148,163,184,0.15); color: var(--text-secondary); }
.badge-loss { background: rgba(248,113,113,0.15); color: var(--accent-red); }
.mc-score-row { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 14px; }
.mc-team { font-size: 14px; font-weight: 700; flex: 1; }
.mc-team.home { text-align: right; }
.mc-team.away { text-align: left; color: var(--text-secondary); }
.mc-team .ha-tag { display: block; font-size: 10px; font-weight: 500; color: var(--text-muted); margin-top: 2px; letter-spacing: 0.5px; }
.mc-score {
  font-size: 28px; font-weight: 900; letter-spacing: 3px;
  padding: 4px 14px; border-radius: 8px;
  background: var(--bg-primary); border: 1px solid var(--border);
  min-width: 90px; text-align: center;
}
.mc-moms { display: flex; gap: 6px; flex-wrap: wrap; padding-top: 12px; border-top: 1px solid rgba(75,85,99,0.2); }
.mom-badge {
  padding: 4px 10px; border-radius: 6px;
  background: rgba(56,189,248,0.06); border: 1px solid rgba(56,189,248,0.1);
  font-size: 11px; color: var(--text-muted); white-space: nowrap;
}
.mom-badge strong { color: var(--accent-blue); font-weight: 600; }
.mom-badge.mvp { background: rgba(251,191,36,0.08); border-color: rgba(251,191,36,0.15); }
.mom-badge.mvp strong { color: var(--accent-yellow); }
/* Table */
.table-wrap {
  background: var(--bg-card); backdrop-filter: blur(12px);
  border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
}
table { width: 100%; border-collapse: collapse; }
thead th {
  padding: 14px 20px; font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-muted); text-align: left;
  background: rgba(15, 23, 42, 0.5); border-bottom: 1px solid var(--border);
  cursor: pointer; user-select: none;
}
thead th:hover { color: var(--text-secondary); }
thead th.sorted { color: var(--accent-blue); }
thead th.sorted::after { content: ' \25BC'; font-size: 9px; }
thead th.text-center, td.text-center { text-align: center; }
tbody tr { transition: background 0.15s ease; border-bottom: 1px solid rgba(75,85,99,0.1); }
tbody tr:hover { background: rgba(30, 41, 59, 0.5); }
td { padding: 14px 20px; font-size: 13px; }
td.number { font-family: monospace; color: var(--text-muted); }
td.name { font-weight: 600; }
td.goals { font-weight: 700; color: var(--accent-blue); }
td.assists { color: var(--text-secondary); }
.rank { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 7px; font-size: 12px; font-weight: 700; }
.rank-1 { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #1a1a1a; }
.rank-2 { background: linear-gradient(135deg, #94a3b8, #cbd5e1); color: #1a1a1a; }
.rank-3 { background: linear-gradient(135deg, #cd7f32, #d4a574); color: #1a1a1a; }
/* Animation */
.page { opacity: 0; transform: translateY(12px); transition: all 0.35s ease; }
.page.active { opacity: 1; transform: translateY(0); }
.page.hidden { display: none; }
.footer { text-align: center; padding: 40px; color: var(--text-muted); font-size: 11px; }
/* Sidebar footer */
.sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-muted); }
/* Responsive */
@media (max-width: 900px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; padding: 20px 16px; }
  .rc-num { font-size: 24px; }
  .form-dot { width: 22px; height: 22px; font-size: 9px; }
  .stat-grid-2x2 { grid-template-columns: 1fr 1fr; gap: 10px; }
  .mc-team { font-size: 13px; }
  .mobile-header {
    display: flex !important; position: sticky; top: 0; z-index: 90;
    padding: 16px 20px; align-items: center; justify-content: space-between;
    background: rgba(15,23,42,0.95); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .mobile-nav {
    display: flex !important; position: fixed; bottom: 0; left: 0; width: 100%; z-index: 90;
    background: rgba(15,23,42,0.95); backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    justify-content: space-around; padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
  }
  .mobile-nav button {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: none; border: none; color: var(--text-muted);
    font-size: 10px; padding: 8px 12px; cursor: pointer;
  }
  .mobile-nav button.active { color: var(--accent-blue); }
  .mobile-nav button .m-icon { font-size: 20px; }
  .main { padding-bottom: 80px; }
}
@media (min-width: 901px) {
  .mobile-header { display: none !important; }
  .mobile-nav { display: none !important; }
}
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
.overlay.show { display: block; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
</style>
</head>

      <div class="table-wrap">

        </table>
      </div>
    </div>

    <div class="footer">SANDRO FC Dashboard &middot; Generated on <span id="genDate"></span></div>
  </div>
</div>

function goTo(tab) {
  document.querySelectorAll('.page').forEach(p => { p.classList.add('hidden'); p.classList.remove('active'); });
  const target = document.getElementById('page-' + tab);
  if (target) { target.classList.remove('hidden'); setTimeout(() => target.classList.add('active'), 10); }
  document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.mobile-nav button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function init() {
  const S = DATA.summary;
  document.getElementById('updatedAt').textContent = DATA.generated_at;
  document.getElementById('genDate').textContent = DATA.generated_at;

  const topScorer = [...DATA.players].sort((a,b) => b.total_goals - a.total_goals)[0];
  const topAssister = [...DATA.players].sort((a,b) => b.total_assists - a.total_assists)[0];

  // Form flow (oldest -> newest)
  const formDots = DATA.matches.map(m => {
    const cls = m.result==='승'?'w':m.result==='패'?'l':'d';
    return `<div class="form-dot ${cls}">${m.result}</div>`;
  }).join('');

  document.getElementById('recordCard').innerHTML = `
    <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;">
      <div class="rc-wdl" style="margin-bottom:0;">
        <div class="rc-item"><div class="rc-num" style="color:var(--accent-blue);">${S.wins}</div><div class="rc-label">승</div></div>
        <div class="rc-item"><div class="rc-num" style="color:var(--text-secondary);">${S.draws}</div><div class="rc-label">무</div></div>
        <div class="rc-item"><div class="rc-num" style="color:var(--accent-red);">${S.losses}</div><div class="rc-label">패</div></div>
      </div>
      <div class="rc-divider"></div>
      <div class="rc-stats">
        <div class="rc-stat"><div class="rc-stat-val" style="color:var(--accent-green);">${S.win_rate}%</div><div class="rc-stat-label">승률</div></div>
        <div class="rc-stat"><div class="rc-stat-val">${S.goals_for}<span style="color:var(--text-muted);font-size:12px;">:</span>${S.goals_against}</div><div class="rc-stat-label">득실</div></div>
        <div class="rc-stat"><div class="rc-stat-val" style="color:${S.goal_diff>=0?'var(--accent-green)':'var(--accent-red)'}">+${S.goal_diff}</div><div class="rc-stat-label">득실차</div></div>
      </div>
    </div>
    <div class="form-flow">
      <span class="form-label">최근전적</span>${formDots}
    </div>
  `;

  // Left: Stat Cards
  const topPoint = [...DATA.players].sort((a,b) => b.points - a.points)[0];
  const topApp = [...DATA.players].sort((a,b) => b.match_count - a.match_count)[0];
  const leftCards = [
    { label: '득점왕', value: topScorer ? topScorer.name : '-', sub: topScorer ? topScorer.total_goals+' 골 ('+topScorer.match_count+'경기)' : '', icon: '&#127919;', gradient: 'var(--gradient-blue)' },
    { label: '도움왕', value: topAssister ? topAssister.name : '-', sub: topAssister ? topAssister.total_assists+' 도움 ('+topAssister.match_count+'경기)' : '', icon: '&#129309;', gradient: 'var(--gradient-orange)' },
    { label: '공격포인트 1위', value: topPoint ? topPoint.name : '-', sub: topPoint ? topPoint.total_goals+'G + '+topPoint.total_assists+'A = '+topPoint.points+'P' : '', icon: '&#11088;', gradient: 'var(--gradient-purple)' },
    { label: '최다 출전', value: topApp ? topApp.name : '-', sub: topApp ? topApp.match_count+' / '+S.total_matches+' 경기' : '', icon: '&#128101;', gradient: 'var(--gradient-green)' },
  ];
  document.getElementById('statCards').innerHTML = leftCards.map(c => `
    <div class="stat-card">
      <div class="sc-header">
        <div class="sc-icon" style="background:${c.gradient};color:#fff;">${c.icon}</div>
        <div class="sc-label">${c.label}</div>
      </div>
      <div class="sc-value">${c.value}</div>
      <div class="sc-sub">${c.sub}</div>
    </div>
  `).join('');

  // All Matches (newest first)
  const matchesSorted = [...DATA.matches].reverse();
  document.getElementById('allMatches').innerHTML = matchesSorted.map(m => {
    const scoreColor = m.result==='승'?'var(--accent-blue)':m.result==='패'?'var(--accent-red)':'var(--text-secondary)';
    const badgeCls = m.result==='승'?'win':m.result==='패'?'loss':'draw';
    return `
    <div class="match-card">
      <div class="mc-top">
        <span class="mc-date">${m.date}${m.venue ? ' &middot; '+m.venue : ''}</span>
        <span class="badge badge-${badgeCls}">${m.result}</span>
      </div>
      <div class="mc-score-row">
        <div class="mc-team home">SANDRO<span class="ha-tag">${m.stadium==='H'?'HOME':'AWAY'}</span></div>
        <div class="mc-score" style="color:${scoreColor}">${m.goals_for} - ${m.goals_against}</div>
        <div class="mc-team away">${m.opponent}</div>
      </div>
      <div class="mc-moms">
        <div class="mom-badge mvp">MVP <strong>${m.mom_match}</strong></div>
        <div class="mom-badge">수비 <strong>${m.mom_def}</strong></div>
        <div class="mom-badge">미드 <strong>${m.mom_mid}</strong></div>
        <div class="mom-badge">공격 <strong>${m.mom_fwd}</strong></div>
      </div>
    </div>`;
  }).join('');

  // Sync heights: match panel = left col height
  setTimeout(() => {
    const leftCol = document.querySelector('.left-col');
    const matchPanel = document.querySelector('.match-panel');
    if (leftCol && matchPanel) {
      matchPanel.style.height = leftCol.offsetHeight + 'px';
    }
  }, 50);

  renderRanking('goals');
}

let currentSort = 'goals';
function sortRanking(by) {
  currentSort = by;
  ['goals','assists','points'].forEach(k => {
    const el = document.getElementById('sort-' + k);
    if (el) { el.classList.toggle('sorted', k === by); }
  });
  renderRanking(by);
}

function renderRanking(sortBy) {
  const key = sortBy === 'goals' ? 'total_goals' : sortBy === 'assists' ? 'total_assists' : 'points';
  const sorted = [...DATA.players].filter(p => p.match_count > 0).sort((a,b) => b[key] - a[key]);
  document.getElementById('rankingTable').innerHTML = sorted.map((p, i) => `
    <tr>
      <td class="text-center"><span class="rank ${i < 3 ? 'rank-' + (i+1) : ''}">${i+1}</span></td>
      <td class="name">${p.name}</td>
      <td class="text-center number">#${p.number}</td>
      <td class="text-center">${p.match_count}</td>
      <td class="text-center goals">${p.total_goals}</td>
      <td class="text-center assists">${p.total_assists}</td>
      <td class="text-center" style="color:var(--accent-purple);font-weight:700;">${p.points}</td>
    </tr>
  `).join('');
}

document.addEventListener('DOMContentLoaded', init);
</script>
